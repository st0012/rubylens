<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Ruby Galaxies</title>
  <desc id="description">Four Ruby codebases rendered as distinct stellar systems by RubyLens.</desc>
  <defs>
    <radialGradient id="background-glow" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#1b1230"/>
      <stop offset=".48" stop-color="#090714"/>
      <stop offset="1" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="panel-glow" cx="50%" cy="47%" r="66%">
      <stop offset="0" stop-color="#281b40" stop-opacity=".68"/>
      <stop offset=".58" stop-color="#0d0a18" stop-opacity=".45"/>
      <stop offset="1" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="top-rule" x1="0" x2="1">
      <stop offset="0" stop-color="#6f5f96" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#8f77bd" stop-opacity=".8"/>
      <stop offset="1" stop-color="#6f5f96" stop-opacity=".12"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c2b3d4" opacity=".10"/>
    </pattern>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wide-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace; }
      .survey { font-size: 15px; letter-spacing: 3.2px; text-transform: uppercase; }
      .project { font-size: 17px; font-weight: 700; letter-spacing: .4px; }
      .designation { font-size: 11px; letter-spacing: 2.1px; text-transform: uppercase; }
      .star { fill: #f5efff; }
      .amber { fill: #ffc36b; stroke: #ffc36b; }
      .cyan { fill: #74d8ff; stroke: #74d8ff; }
      .violet { fill: #b597ef; stroke: #b597ef; }
      .rose { fill: #f487ac; stroke: #f487ac; }
      .orbit { fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#background-glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="358" rx="540" ry="220" fill="#6b3da0" opacity=".055" filter="url(#wide-glow)"/>

  <g class="mono" transform="translate(50 34)">
    <text class="survey" x="0" y="0" fill="#8e8799">RUBY-GALAXIES · STELLAR SURVEY</text>
    <text class="survey" x="1100" y="0" fill="#ffc36b" text-anchor="end">ST0012.DEV / 2026</text>
  </g>
  <line x1="50" y1="58" x2="1150" y2="58" stroke="url(#top-rule)"/>

  <g class="mono" transform="translate(50 104)">
    <text x="0" y="0" fill="#ffc36b" font-size="14" letter-spacing="3">// A FIELD SURVEY</text>
    <text x="0" y="70" fill="#f1ebf7" font-size="66" font-weight="600" letter-spacing="-2.5">Ruby Galaxies</text>
    <text x="2" y="111" fill="#aaa0b8" font-size="18" letter-spacing=".2">Four Ruby codebases rendered as live stellar systems by RubyLens.</text>
    <text x="1100" y="111" fill="#74d8ff" font-size="16" letter-spacing=".8" text-anchor="end">st0012.dev/ruby-galaxies</text>
  </g>

  <g transform="translate(50 250)">
    <rect x="0" y="0" width="260" height="292" rx="2" fill="url(#panel-glow)" stroke="#473a61" stroke-opacity=".62"/>
    <path d="M0 20V0h20 M240 0h20v20 M0 272v20h20 M240 292h20v-20" fill="none" stroke="#8f77bd" opacity=".86"/>
    <g transform="translate(130 126)">
      <ellipse rx="86" ry="52" fill="#d795ff" opacity=".07" transform="rotate(-12)" filter="url(#wide-glow)"/>
      <path class="orbit violet" d="M-91 12C-66-45 1-59 83-22" stroke-width="2" opacity=".42"/>
      <path class="orbit cyan" d="M92-10C52 38-20 55-86 24" stroke-width="1.6" opacity=".35"/>
      <path class="orbit violet" d="M-74-30C-23-3 26 5 76 25" stroke-width="1.4" opacity=".34"/>
      <line x1="-36" y1="6" x2="38" y2="-7" stroke="#ffc36b" stroke-width="5" opacity=".84" filter="url(#soft-glow)"/>
      <circle class="amber" cx="0" cy="0" r="6" filter="url(#soft-glow)"/>
      <circle class="cyan" cx="-76" cy="-21" r="2.6"/><circle class="star" cx="-56" cy="36" r="1.8"/>
      <circle class="violet" cx="-43" cy="-43" r="2.2"/><circle class="amber" cx="-25" cy="31" r="2.5"/>
      <circle class="cyan" cx="28" cy="-39" r="2"/><circle class="star" cx="49" cy="34" r="2.2"/>
      <circle class="violet" cx="77" cy="16" r="2.8"/><circle class="star" cx="66" cy="-28" r="1.7"/>
      <circle class="amber" cx="-92" cy="13" r="1.8"/><circle class="cyan" cx="95" cy="-8" r="1.8"/>
      <circle class="star" cx="-12" cy="-50" r="1.5"/><circle class="violet" cx="14" cy="46" r="1.7"/>
    </g>
    <g class="mono" transform="translate(20 240)">
      <text x="0" y="0" fill="#ffc36b" font-size="12" letter-spacing="1.6">[01/04]</text>
      <text class="project" x="0" y="28" fill="#eee8f5">RuboCop</text>
      <text class="designation" x="220" y="28" fill="#8e8799" text-anchor="end">BARRED SPIRAL</text>
    </g>
  </g>

  <g transform="translate(330 250)">
    <rect x="0" y="0" width="260" height="292" rx="2" fill="url(#panel-glow)" stroke="#473a61" stroke-opacity=".62"/>
    <path d="M0 20V0h20 M240 0h20v20 M0 272v20h20 M240 292h20v-20" fill="none" stroke="#8f77bd" opacity=".86"/>
    <g transform="translate(130 126)">
      <ellipse rx="84" ry="58" fill="#74d8ff" opacity=".06" transform="rotate(14)" filter="url(#wide-glow)"/>
      <path class="orbit cyan" d="M-91-4C-64-47-2-53 55-27C90-11 93 21 59 36" stroke-width="2.2" opacity=".46"/>
      <path class="orbit violet" d="M91 5C63 48 1 55-57 27C-90 11-91-19-60-35" stroke-width="1.8" opacity=".4"/>
      <path class="orbit amber" d="M-63 41C-26 18 20 11 66-37" stroke-width="1.1" opacity=".27"/>
      <circle class="rose" cx="0" cy="0" r="7" filter="url(#soft-glow)"/>
      <circle class="star" cx="-82" cy="-17" r="1.6"/><circle class="cyan" cx="-67" cy="30" r="2.4"/>
      <circle class="violet" cx="-48" cy="-40" r="2.1"/><circle class="rose" cx="-31" cy="21" r="2.8"/>
      <circle class="amber" cx="-5" cy="-42" r="1.9"/><circle class="cyan" cx="24" cy="35" r="2.3"/>
      <circle class="star" cx="44" cy="-34" r="1.8"/><circle class="violet" cx="67" cy="27" r="2.6"/>
      <circle class="cyan" cx="91" cy="3" r="2"/><circle class="rose" cx="73" cy="-24" r="1.8"/>
      <circle class="star" cx="-14" cy="49" r="1.4"/><circle class="amber" cx="18" cy="-50" r="1.6"/>
    </g>
    <g class="mono" transform="translate(20 240)">
      <text x="0" y="0" fill="#ffc36b" font-size="12" letter-spacing="1.6">[02/04]</text>
      <text class="project" x="0" y="28" fill="#eee8f5">Ruby on Rails</text>
      <text class="designation" x="220" y="28" fill="#8e8799" text-anchor="end">SPIRAL</text>
    </g>
  </g>

  <g transform="translate(610 250)">
    <rect x="0" y="0" width="260" height="292" rx="2" fill="url(#panel-glow)" stroke="#473a61" stroke-opacity=".62"/>
    <path d="M0 20V0h20 M240 0h20v20 M0 272v20h20 M240 292h20v-20" fill="none" stroke="#8f77bd" opacity=".86"/>
    <g transform="translate(130 126)">
      <ellipse rx="91" ry="61" fill="#f487ac" opacity=".055" transform="rotate(-7)" filter="url(#wide-glow)"/>
      <path class="orbit rose" d="M-96 10C-79-42-20-63 43-42C83-29 100 2 75 31" stroke-width="2.1" opacity=".4"/>
      <path class="orbit cyan" d="M96-9C78 42 19 63-45 42C-84 29-99-2-74-31" stroke-width="1.7" opacity=".38"/>
      <path class="orbit violet" d="M-78-35C-38-7 9 7 78 31" stroke-width="1.2" opacity=".28"/>
      <circle class="amber" cx="0" cy="0" r="8" filter="url(#soft-glow)"/>
      <circle class="rose" cx="-91" cy="10" r="2.2"/><circle class="star" cx="-79" cy="-30" r="1.7"/>
      <circle class="cyan" cx="-61" cy="37" r="2.6"/><circle class="violet" cx="-41" cy="-48" r="2.1"/>
      <circle class="amber" cx="-24" cy="29" r="2.5"/><circle class="rose" cx="11" cy="-48" r="1.9"/>
      <circle class="cyan" cx="34" cy="42" r="2.2"/><circle class="star" cx="54" cy="-36" r="1.6"/>
      <circle class="violet" cx="80" cy="25" r="2.9"/><circle class="rose" cx="97" cy="-7" r="2"/>
      <circle class="star" cx="-2" cy="53" r="1.4"/><circle class="cyan" cx="73" cy="-25" r="1.8"/>
    </g>
    <g class="mono" transform="translate(20 240)">
      <text x="0" y="0" fill="#ffc36b" font-size="12" letter-spacing="1.6">[03/04]</text>
      <text class="project" x="0" y="28" fill="#eee8f5">Discourse</text>
      <text class="designation" x="220" y="28" fill="#8e8799" text-anchor="end">SPIRAL</text>
    </g>
  </g>

  <g transform="translate(890 250)">
    <rect x="0" y="0" width="260" height="292" rx="2" fill="url(#panel-glow)" stroke="#473a61" stroke-opacity=".62"/>
    <path d="M0 20V0h20 M240 0h20v20 M0 272v20h20 M240 292h20v-20" fill="none" stroke="#8f77bd" opacity=".86"/>
    <g transform="translate(130 126)">
      <ellipse rx="82" ry="55" fill="#ffc36b" opacity=".055" transform="rotate(9)" filter="url(#wide-glow)"/>
      <path class="orbit amber" d="M-88 8C-64-39-3-55 55-30C87-17 94 11 71 35" stroke-width="2.1" opacity=".42"/>
      <path class="orbit violet" d="M89-7C64 40 3 55-55 30C-88 17-94-11-71-35" stroke-width="1.7" opacity=".38"/>
      <path class="orbit cyan" d="M-66 36C-22 14 23 4 67-37" stroke-width="1.15" opacity=".28"/>
      <circle class="cyan" cx="0" cy="0" r="7" filter="url(#soft-glow)"/>
      <circle class="amber" cx="-87" cy="8" r="2.3"/><circle class="violet" cx="-71" cy="-28" r="1.9"/>
      <circle class="star" cx="-54" cy="35" r="1.7"/><circle class="cyan" cx="-38" cy="-42" r="2.3"/>
      <circle class="rose" cx="-19" cy="29" r="2.1"/><circle class="amber" cx="8" cy="-45" r="2"/>
      <circle class="violet" cx="31" cy="38" r="2.7"/><circle class="star" cx="52" cy="-33" r="1.5"/>
      <circle class="cyan" cx="72" cy="29" r="2.5"/><circle class="amber" cx="90" cy="-5" r="2.1"/>
      <circle class="star" cx="-7" cy="49" r="1.4"/><circle class="rose" cx="68" cy="-23" r="1.7"/>
    </g>
    <g class="mono" transform="translate(20 240)">
      <text x="0" y="0" fill="#ffc36b" font-size="12" letter-spacing="1.6">[04/04]</text>
      <text class="project" x="0" y="28" fill="#eee8f5">rubygems.org</text>
      <text class="designation" x="220" y="28" fill="#8e8799" text-anchor="end">SPIRAL</text>
    </g>
  </g>

  <g class="mono" transform="translate(50 590)">
    <text x="0" y="0" fill="#8e8799" font-size="12" letter-spacing="1.7">LIVE SHOWCASES · INTERACTIVE EXPLORERS</text>
    <text x="1100" y="0" fill="#74d8ff" font-size="12" letter-spacing="1.7" text-anchor="end">MADE WITH RUBYLENS</text>
  </g>
</svg>
